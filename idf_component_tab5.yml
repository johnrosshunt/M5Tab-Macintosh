## IDF Component Manager manifest for the M5Stack Tab5 build.
##
## Tab5 uses M5Unified/M5GFX (Arduino libraries declared in platformio.ini)
## for all hardware access, so no extra ESP-IDF managed components are needed.
## The pre-boot "USB Disk" mode uses Arduino's bundled TinyUSB (via the
## USBMSC class in the arduino-esp32 core), so no managed component needed.
dependencies:
  idf:
    version: ">=5.5"
