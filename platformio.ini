; PlatformIO Project Configuration File
; BasiliskII ESP32 - Macintosh Emulator
;
; Supports two boards, built from the same source tree:
;   - [env:esp32p4_pioarduino] - M5Stack Tab5 (original target)
;   - [env:waveshare_p4_101]   - Waveshare ESP32-P4-WIFI6-Touch-LCD-10.1
;
; Most build flags, optimizations, and the BasiliskII source filter are
; shared via the [common] section. Per-board differences live in each env.
;

; =============================================================================
; Shared configuration
; =============================================================================
[common]
; Pin to pioarduino 55.03.38-1 (Arduino core 3.3.8 / ESP-IDF 5.5.4).
; IDF >= 5.5 is required by the Waveshare BSP component. The Tab5 build also
; uses this platform - the upgrade from 54.03.21 has been validated locally.
platform = https://github.com/pioarduino/platform-espressif32.git#fbdfc2962e468ca3c4b51811ae691ed887df903c
upload_speed = 1500000
monitor_speed = 115200
build_type = release
framework = arduino
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
board_build.partitions = partitions.csv

; BasiliskII optimizations, CPU type sizing, and include paths. These are
; board-agnostic. Per-board hardware defines live in each env below.
build_flags_common =
    ; Fix missing sdkconfig.h issue by adding correct include path
    -I ~/.platformio/packages/framework-arduinoespressif32-libs/esp32p4/qio_qspi/include
    ; PSRAM and debug settings
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Optimize for speed (CPU emulation performance)
    -O3
    -ffunction-sections
    -fdata-sections
    -fno-common
    -fno-rtti
    -fno-exceptions
    -funroll-loops
    -fomit-frame-pointer
    ; Additional speed optimizations
    -finline-functions
    -finline-limit=300
    -ffast-math
    -fno-math-errno
    ; Aggressive inlining for hot paths
    -fno-strict-aliasing
    ; BasiliskII configuration
    -DEMULATED_68K=1
    -DREAL_ADDRESSING=0
    -DDIRECT_ADDRESSING=0
    -DROM_IS_WRITE_PROTECTED=1
    -DSAVE_MEMORY_BANKS=1
    -DFLIGHT_RECORDER=0
    -DNO_INLINE_MEMORY_ACCESS=0
    ; Data type sizes for ESP32 (32-bit RISC-V)
    -DSIZEOF_SHORT=2
    -DSIZEOF_INT=4
    -DSIZEOF_LONG=4
    -DSIZEOF_LONG_LONG=8
    -DSIZEOF_VOID_P=4
    ; FPU configuration
    -DFPU_IEEE=1
    -DFPU_UAE=0
    -DFPU_X86=0
    ; Disable features not available on ESP32
    -DENABLE_MON=0
    -DUSE_JIT=0
    ; Include paths for BasiliskII
    -I src/basilisk
    -I src/basilisk/include
    -I src/basilisk/uae_cpu
    -I src/basilisk/uae_cpu/fpu
    -I src/basilisk/uae_cpu/generated
    ; Board HAL include path
    -I src/board
    ; Compiler warnings - disable noisy ones
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-unused-but-set-variable
    -Wno-sign-compare
    -Wno-missing-field-initializers
    -Wno-return-type
    -Wno-deprecated-enum-enum-conversion
    -Wno-pointer-arith
    ; Linker flags to reduce BSS
    -Wl,--gc-sections
    ; Allow linker to split sections across non-contiguous regions
    -Wl,--enable-non-contiguous-regions

; Source filter for BasiliskII core sources. Board-specific files are layered
; on per env via build_src_filter overrides.
build_src_filter_common =
    +<*>
    +<basilisk/*.cpp>
    +<basilisk/uae_cpu/*.cpp>
    +<basilisk/uae_cpu/fpu/fpu_ieee.cpp>
    +<basilisk/uae_cpu/generated/cpudefs.cpp>
    +<basilisk/uae_cpu/generated/cpuemu.cpp>
    +<basilisk/uae_cpu/generated/cpustbl.cpp>
    -<basilisk/ESP32/*>
    -<basilisk/audio_dummy.cpp>
    -<basilisk/ether_dummy.cpp>
    -<basilisk/scsi.cpp>
    -<basilisk/scsi_dummy.cpp>
    -<basilisk/serial.cpp>
    -<basilisk/serial_dummy.cpp>
    -<basilisk/clip_dummy.cpp>

; Shared scripts used by both envs
extra_scripts_common =
    pre:scripts/add_toolchain_path.py
    pre:scripts/pre_build.py
    pre:scripts/select_component_yml.py
    post:scripts/post_build_merge.py

; =============================================================================
; M5Stack Tab5 environment (original target)
; =============================================================================
[env:esp32p4_pioarduino]
platform = ${common.platform}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
build_type = ${common.build_type}
framework = ${common.framework}
board = ${common.board}
board_build.mcu = ${common.board_build.mcu}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.partitions = ${common.board_build.partitions}

extra_scripts = ${common.extra_scripts_common}

build_flags =
    ${common.build_flags_common}
    ; Select Tab5 board implementation in src/board
    -DBOARD_M5STACK_TAB5=1

build_src_filter =
    ${common.build_src_filter_common}
    +<board/tab5/*>
    -<board/waveshare/*>

build_unflags =

lib_deps =
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git

; =============================================================================
; Waveshare ESP32-P4-WIFI6-Touch-LCD-10.1 environment
; =============================================================================
[env:waveshare_p4_101]
platform = ${common.platform}
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
build_type = ${common.build_type}
framework = ${common.framework}
board = ${common.board}
board_build.mcu = ${common.board_build.mcu}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.partitions = ${common.board_build.partitions}

; Merge board-specific sdkconfig defaults on top of Arduino's (SDMMC, SPIRAM,
; LCD type selection for the Waveshare BSP, etc.)
board_build.esp-idf.sdkconfig_defaults =
    sdkconfig.waveshare

extra_scripts = ${common.extra_scripts_common}

build_flags =
    ${common.build_flags_common}
    ; Select Waveshare board implementation in src/board
    -DBOARD_WAVESHARE_P4_101=1
    ; On the Waveshare the USB-OTG port is wired for host mode (keyboard/
    ; mouse), so the CDC device never enumerates. Route Arduino Serial
    ; to UART0 (GPIO37 TX / GPIO38 RX) which sits behind the onboard
    ; USB-UART bridge - that is the port exposed to the host when the
    ; "UART" Type-C cable is plugged in. Without this override,
    ; Serial.println() output never reaches the user.
    -UARDUINO_USB_CDC_ON_BOOT
    -UARDUINO_USB_MODE
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    ; Waveshare BSP Kconfig selections (match sdkconfig.waveshare)
    -DCONFIG_BSP_LCD_TYPE_800_1280_10_1_INCH=1
    -DCONFIG_BSP_LCD_COLOR_FORMAT_RGB565=1
    -DCONFIG_BSP_I2C_FAST_MODE=1
    ; Skip LVGL - we use MiniGfx for UI rendering instead
    -DBSP_CONFIG_NO_GRAPHIC_LIB=1
    ; esp_codec_dev Kconfig selections - enabled consumers see the codec
    ; headers that are gated by these #ifdefs in esp_codec_dev_defaults.h
    -DCONFIG_CODEC_ES8311_SUPPORT=1
    -DCONFIG_CODEC_ES7210_SUPPORT=1
    -DCONFIG_CODEC_ES8388_SUPPORT=1
    -DCONFIG_CODEC_DUMMY_SUPPORT=1
    -DCONFIG_CODEC_I2S_SUPPORT=1
    -DCONFIG_CODEC_I2C_SUPPORT=1
    -DCONFIG_CODEC_GPIO_SUPPORT=1
    ; esp_lcd_touch max point count (from esp_lcd_touch Kconfig)
    -DCONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
    -DCONFIG_ESP_LCD_TOUCH_MAX_BUTTONS=1
    ; Allow the BSP header to be found when included as "bsp/..."
    -I lib/esp32_p4_wifi6_touch_lcd_x/include

build_src_filter =
    ${common.build_src_filter_common}
    +<board/waveshare/*>
    -<board/tab5/*>
    ; Tab5 audio uses M5.Speaker / ES8388 via M5Unified; replaced on
    ; Waveshare by audio_esp32_waveshare.cpp (ES8311 via BSP + esp_codec_dev).
    -<basilisk/audio_esp32.cpp>

build_unflags =

; No M5Unified/M5GFX on the Waveshare board - it's not supported there.
; All driver bring-up goes through the vendored BSP component (lib/) and
; ESP-IDF managed components listed in idf_component_waveshare.yml.
lib_deps =
